<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>مبارياتي</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#0f0f0f;
      color:white;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px;
      font-size:24px;
      font-weight:bold;
    }

    .days{
      display:flex;
      justify-content:center;
      gap:10px;
      margin-bottom:15px;
    }

    .day{
      background:#1d1d1d;
      padding:10px 18px;
      border-radius:12px;
      color:#aaa;
      cursor:pointer;
    }

    .active{
      background:#2b2b2b;
      color:white;
    }

    .league-title{
      background:#222;
      padding:12px 15px;
      margin-top:10px;
      font-size:18px;
      font-weight:bold;
      border-right:4px solid orange;
    }

    .match{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 15px;
      border-bottom:1px solid #222;
    }

    .team{
      display:flex;
      align-items:center;
      gap:10px;
      width:35%;
    }

    .team img{
      width:35px;
      height:35px;
    }

    .time{
      font-size:20px;
      color:#ddd;
    }

    .bottom-nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:#161616;
      display:flex;
      justify-content:space-around;
      padding:12px 0;
      border-top:1px solid #333;
    }

    .nav-item{
      text-align:center;
      color:#aaa;
      font-size:14px;
    }

    .nav-item.active{
      color:#4ea3ff;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <span>⚽ كل المباريات</span>
    <span>🔍</span>
  </div>

  <div class="days">
    <div class="day">أمس</div>
    <div class="day active">اليوم</div>
    <div class="day">غداً</div>
  </div>

  <div class="league-title">
    كأس أمم أفريقيا للناشئين
  </div>

  <div class="match">
    <div class="team">
      <img src="https://flagcdn.com/w40/et.png">
      <span>إثيوبيا</span>
    </div>

    <div class="time">7:00 م</div>

    <div class="team" style="justify-content:flex-end;">
      <span>موزمبيق</span>
      <img src="https://flagcdn.com/w40/mz.png">
    </div>
  </div>

  <div class="match">
    <div class="team">
      <img src="https://flagcdn.com/w40/ug.png">
      <span>أوغندا</span>
    </div>

    <div class="time">10:00 م</div>

    <div class="team" style="justify-content:flex-end;">
      <span>غانا</span>
      <img src="https://flagcdn.com/w40/gh.png">
    </div>
  </div>

  <div class="league-title" style="border-color:#4ea3ff;">
    تشامبيونشيب
  </div>

  <div class="match">
    <div class="team">
      <img src="https://upload.wikimedia.org/wikipedia/en/5/54/Hull_City_AFC_logo.svg">
      <span>هال سيتي</span>
    </div>

    <div class="time">5:30 م</div>

    <div class="team" style="justify-content:flex-end;">
      <span>ميدلزبره</span>
      <img src="https://upload.wikimedia.org/wikipedia/en/2/2c/Middlesbrough_FC_crest.svg">
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item">المزيد</div>
    <div class="nav-item">أخبار</div>
    <div class="nav-item">بطولات</div>
    <div class="nav-item">فرقي</div>
    <div class="nav-item active">مباريات</div>
  </div>

</body>
</html>
